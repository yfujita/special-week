# リファクタ前の直書き値（最適化前のベースライン）を退避したもの。
# ScoringParams のデフォルトを Optuna 最適化値へ差し替えたため、ベースラインを
# 再現したい場合（再最適化時の比較基準・新レースセットでのベースライン取り直し等）は
# このファイルを run_backtest.py --params に渡す:
#   python3 run_backtest.py --params baseline_params.yaml --run-id baseline_check
win_score_1st: 5.0
win_score_top3: 2.0
grade1_rank1: 30.0
