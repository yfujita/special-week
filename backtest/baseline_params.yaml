grade2_rank1: 20.0
grade2_rank3: 7.0
grade2_rank5: 4.0
grade3_rank1: 15.0
grade3_rank3: 5.0
grade3_rank5: 3.0
difference_multiplier: 1.0
distance_base: 1000.0
penalty_rank6plus: 2.0
penalty_rank4_5: 1.2
penalty_rank2_3: 1.1
run_type_nige_threshold: 0.2
run_type_senkou_threshold: 0.4
run_type_sashi_threshold: 0.7
enable_field_size_correction: false
field_size_base: 18
course_type_mismatch_penalty: 1.0
course_condition_match_bonus: 1.0
